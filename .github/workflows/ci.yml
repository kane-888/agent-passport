name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  attribution-boundaries:
    name: Attribution Boundaries
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      AGENT_PASSPORT_USE_KEYCHAIN: "0"
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          package-manager-cache: false

      - name: Verify record-route attribution boundary
        run: npm run verify:record-route-attribution:http

      - name: Verify agent-message attribution boundary
        run: npm run verify:agent-message-attribution:http

      - name: Verify agent-runtime attribution boundary
        run: npm run verify:agent-runtime-attribution:http

  smoke-core:
    name: Smoke Core
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      AGENT_PASSPORT_USE_KEYCHAIN: "0"
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          package-manager-cache: false

      - name: Run deploy verification regressions
        run: npm run test:verify:deploy:http

      - name: Run smoke semantics regressions
        run: npm run test:smoke:semantics

      - name: Run smoke operational semantics regressions
        run: npm run test:smoke:operational-semantics

      - name: Run smoke runtime evidence semantics regressions
        run: npm run test:smoke:runtime-evidence-semantics

      - name: Run combined smoke without browser gate
        run: npm run smoke:all:ci

  smoke-browser:
    name: Smoke Browser
    runs-on: macos-15
    needs:
      - smoke-core
    timeout-minutes: 30
    env:
      AGENT_PASSPORT_USE_KEYCHAIN: "0"
      AGENT_PASSPORT_BROWSER: "Safari"
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          package-manager-cache: false

      - name: Run combined smoke with browser gate
        run: npm run smoke:all
