<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>agent-passport 离线线程</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #08111f;
        --panel: #101b2d;
        --panel-soft: #13213a;
        --line: rgba(255, 255, 255, 0.08);
        --text: #edf4ff;
        --muted: #93a8c8;
        --accent: #78e8c7;
        --accent-strong: #4fd7c5;
        --user: #204a8b;
        --assistant: #162742;
        --danger: #ff907a;
        --warning: #ffd37c;
        --shadow: 0 18px 48px rgba(0, 0, 0, 0.28);
        --radius: 20px;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        height: 100dvh;
        overflow: hidden;
        font-family: "PingFang SC", "SF Pro Display", "Helvetica Neue", sans-serif;
        background:
          radial-gradient(circle at top right, rgba(120, 232, 199, 0.16), transparent 28%),
          radial-gradient(circle at bottom left, rgba(79, 215, 197, 0.18), transparent 24%),
          linear-gradient(180deg, #08111f 0%, #0b1424 44%, #0d182c 100%);
        color: var(--text);
      }

      .shell {
        max-width: 1440px;
        margin: 0 auto;
        padding: 28px;
        height: 100%;
        display: grid;
        grid-template-rows: auto minmax(0, 1fr);
        gap: 20px;
      }

      .hero {
        display: flex;
        justify-content: space-between;
        gap: 20px;
        align-items: flex-start;
      }

      .hero h1 {
        margin: 0 0 8px;
        font-size: 32px;
        line-height: 1.1;
      }

      .hero p {
        margin: 0;
        color: var(--muted);
        line-height: 1.6;
      }

      .stack-chip,
      .network-chip {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 10px 14px;
        border: 1px solid var(--line);
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.04);
        color: var(--text);
        font-size: 13px;
      }

      .network-chip.offline {
        color: var(--warning);
      }

      .hero-actions {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        margin-top: 14px;
      }

      .hero-link {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 10px 14px;
        border: 1px solid var(--line);
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.04);
        color: var(--text);
        text-decoration: none;
        font-size: 13px;
      }

      .hero-link:hover {
        border-color: rgba(120, 232, 199, 0.34);
      }

      .workspace {
        display: grid;
        grid-template-columns: 310px minmax(0, 1fr);
        gap: 18px;
        min-height: 0;
      }

      .panel {
        background: linear-gradient(180deg, rgba(18, 29, 49, 0.98), rgba(12, 21, 36, 0.98));
        border: 1px solid var(--line);
        border-radius: var(--radius);
        box-shadow: var(--shadow);
        min-height: 0;
      }

      .sidebar {
        overflow: auto;
      }

      .sidebar-section {
        padding: 18px;
        border-bottom: 1px solid var(--line);
      }

      .sidebar-section:last-child {
        border-bottom: none;
      }

      .sidebar-title {
        margin: 0 0 12px;
        color: var(--muted);
        font-size: 12px;
        letter-spacing: 0.12em;
        text-transform: uppercase;
      }

      .thread-list {
        display: flex;
        flex-direction: column;
        gap: 10px;
      }

      .thread-button {
        width: 100%;
        border: 1px solid transparent;
        border-radius: 18px;
        background: rgba(255, 255, 255, 0.04);
        color: var(--text);
        text-align: left;
        padding: 14px;
        cursor: pointer;
      }

      .thread-button:hover {
        border-color: rgba(120, 232, 199, 0.34);
      }

      .thread-button.active {
        background: linear-gradient(180deg, rgba(120, 232, 199, 0.16), rgba(79, 215, 197, 0.12));
        border-color: rgba(120, 232, 199, 0.48);
      }

      .thread-label {
        font-size: 16px;
        font-weight: 600;
        margin-bottom: 4px;
      }

      .thread-meta {
        color: var(--muted);
        font-size: 12px;
        line-height: 1.5;
      }

      .sync-card {
        display: flex;
        flex-direction: column;
        gap: 10px;
      }

      .thread-context-summary {
        color: var(--muted);
        font-size: 13px;
        line-height: 1.7;
      }

      .thread-context-list {
        display: flex;
        flex-direction: column;
        gap: 10px;
      }

      .thread-context-card {
        border: 1px solid var(--line);
        border-radius: 16px;
        padding: 12px 14px;
        background: rgba(255, 255, 255, 0.04);
      }

      .thread-context-name {
        font-size: 14px;
        font-weight: 600;
      }

      .thread-context-meta {
        margin-top: 4px;
        color: var(--muted);
        font-size: 12px;
        line-height: 1.6;
      }

      .thread-context-goal {
        margin-top: 8px;
        font-size: 13px;
        line-height: 1.7;
      }

      .source-summary {
        color: var(--muted);
        font-size: 13px;
        line-height: 1.7;
      }

      .dispatch-history-summary {
        color: var(--muted);
        font-size: 13px;
        line-height: 1.7;
      }

      .dispatch-history-list {
        display: flex;
        flex-direction: column;
        gap: 10px;
      }

      .dispatch-history-card {
        border: 1px solid var(--line);
        border-radius: 16px;
        padding: 12px 14px;
        background: rgba(255, 255, 255, 0.04);
      }

      .dispatch-history-head {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        align-items: flex-start;
      }

      .dispatch-history-title {
        font-size: 14px;
        font-weight: 600;
      }

      .dispatch-history-meta {
        margin-top: 4px;
        color: var(--muted);
        font-size: 12px;
        line-height: 1.6;
      }

      .dispatch-history-body {
        margin-top: 8px;
        display: flex;
        flex-direction: column;
        gap: 6px;
        font-size: 13px;
        line-height: 1.7;
      }

      .dispatch-history-line {
        color: var(--text);
      }

      .dispatch-history-line.muted {
        color: var(--muted);
      }

      .dispatch-chip-row {
        margin-top: 10px;
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      .dispatch-chip {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 6px 10px;
        border-radius: 999px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        background: rgba(255, 255, 255, 0.04);
        color: var(--muted);
        font-size: 12px;
      }

      .dispatch-chip.parallel {
        border-color: rgba(120, 232, 199, 0.36);
        color: var(--accent);
      }

      .dispatch-chip.blocked {
        border-color: rgba(255, 211, 124, 0.34);
        color: var(--warning);
      }

      .source-filter-list {
        display: flex;
        flex-direction: column;
        gap: 10px;
      }

      .source-filter-button {
        width: 100%;
        border: 1px solid transparent;
        border-radius: 16px;
        padding: 12px 14px;
        background: rgba(255, 255, 255, 0.04);
        color: var(--text);
        text-align: left;
        cursor: pointer;
      }

      .source-filter-button:hover {
        border-color: rgba(120, 232, 199, 0.34);
      }

      .source-filter-button.active {
        border-color: rgba(120, 232, 199, 0.48);
        background: linear-gradient(180deg, rgba(120, 232, 199, 0.16), rgba(79, 215, 197, 0.12));
      }

      .source-filter-label {
        display: block;
        font-size: 14px;
        font-weight: 600;
      }

      .source-filter-meta {
        display: block;
        margin-top: 4px;
        color: var(--muted);
        font-size: 12px;
      }

      .sync-status {
        font-size: 14px;
        line-height: 1.6;
      }

      .auth-card,
      .token-form {
        display: flex;
        flex-direction: column;
        gap: 10px;
      }

      .auth-status {
        color: var(--muted);
        font-size: 13px;
        line-height: 1.6;
      }

      .token-input {
        width: 100%;
        border: 1px solid var(--line);
        border-radius: 14px;
        padding: 12px 14px;
        background: rgba(255, 255, 255, 0.04);
        color: var(--text);
      }

      .token-input::placeholder {
        color: rgba(147, 168, 200, 0.84);
      }

      .sync-actions {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
      }

      .action-button {
        border: 1px solid rgba(120, 232, 199, 0.24);
        border-radius: 999px;
        padding: 10px 14px;
        background: rgba(120, 232, 199, 0.08);
        color: var(--text);
        cursor: pointer;
      }

      .action-button.secondary {
        border-color: var(--line);
        background: rgba(255, 255, 255, 0.04);
      }

      .chat-panel {
        display: grid;
        grid-template-rows: auto minmax(0, 1fr) auto;
        min-height: 0;
        overflow: hidden;
      }

      .chat-header {
        padding: 22px 24px 16px;
        border-bottom: 1px solid var(--line);
        display: flex;
        justify-content: space-between;
        gap: 16px;
        align-items: flex-start;
      }

      .chat-header h2 {
        margin: 0 0 6px;
        font-size: 24px;
      }

      .chat-header p {
        margin: 0;
        color: var(--muted);
        line-height: 1.6;
      }

      .status-pill {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 10px 12px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.04);
        border: 1px solid var(--line);
        color: var(--muted);
        font-size: 13px;
      }

      .notice-banner {
        margin: 0 24px;
        padding: 12px 14px;
        border-bottom: 1px solid var(--line);
        font-size: 13px;
        line-height: 1.7;
      }

      .notice-banner[hidden] {
        display: none;
      }

      .notice-banner[data-level="warning"] {
        color: var(--warning);
        background: rgba(255, 211, 124, 0.08);
      }

      .notice-banner[data-level="error"] {
        color: var(--danger);
        background: rgba(255, 144, 122, 0.08);
      }

      .messages {
        padding: 20px 24px;
        min-height: 0;
        overflow-y: auto;
        display: flex;
        flex-direction: column;
        gap: 14px;
        overscroll-behavior: contain;
      }

      .message {
        max-width: 78%;
        border-radius: 18px;
        padding: 14px 16px;
        border: 1px solid var(--line);
        background: var(--assistant);
      }

      .message.user {
        align-self: flex-end;
        background: var(--user);
      }

      .message-head {
        display: flex;
        justify-content: space-between;
        gap: 16px;
        margin-bottom: 8px;
      }

      .message-author {
        font-weight: 600;
      }

      .message-time {
        color: var(--muted);
        font-size: 12px;
      }

      .message-body {
        white-space: pre-wrap;
        line-height: 1.7;
      }

      .message-meta {
        margin-top: 10px;
        display: flex;
        flex-direction: column;
        align-items: flex-start;
        gap: 8px;
      }

      .message-source {
        margin-top: 0;
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 6px 10px;
        border-radius: 999px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        background: rgba(255, 255, 255, 0.04);
        color: var(--muted);
        font-size: 12px;
      }

      .message-source.source-fast {
        border-color: rgba(120, 232, 199, 0.36);
        color: var(--accent);
      }

      .message-source.source-command {
        border-color: rgba(125, 185, 255, 0.34);
        color: #b6d5ff;
      }

      .message-source.source-ollama {
        border-color: rgba(255, 211, 124, 0.34);
        color: var(--warning);
      }

      .message-source.source-fallback {
        border-color: rgba(255, 144, 122, 0.34);
        color: var(--danger);
      }

      .message-dispatch {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 6px 10px;
        border-radius: 999px;
        border: 1px dashed rgba(255, 255, 255, 0.14);
        background: rgba(255, 255, 255, 0.02);
        color: var(--muted);
        font-size: 12px;
      }

      .composer {
        padding: 18px 24px 24px;
        border-top: 1px solid var(--line);
        display: flex;
        flex-direction: column;
        gap: 12px;
      }

      .composer textarea {
        width: 100%;
        min-height: 104px;
        resize: vertical;
        border: 1px solid var(--line);
        border-radius: 18px;
        background: rgba(255, 255, 255, 0.04);
        color: var(--text);
        padding: 16px;
        font: inherit;
        line-height: 1.6;
      }

      .composer-footer {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        align-items: center;
        flex-wrap: wrap;
      }

      .composer-hint {
        color: var(--muted);
        font-size: 13px;
      }

      .send-button {
        min-width: 120px;
        border: none;
        border-radius: 999px;
        padding: 12px 18px;
        background: linear-gradient(135deg, var(--accent), var(--accent-strong));
        color: #032523;
        font-weight: 700;
        cursor: pointer;
      }

      .send-button:disabled,
      .action-button:disabled {
        cursor: wait;
        opacity: 0.62;
      }

      .empty-state {
        color: var(--muted);
        line-height: 1.7;
      }

      @media (max-width: 980px) {
        .shell {
          padding: 18px;
        }

        .workspace {
          grid-template-columns: 1fr;
          grid-template-rows: auto minmax(0, 1fr);
        }

        .sidebar {
          max-height: 32vh;
        }

        .message {
          max-width: 92%;
        }

        .hero {
          flex-direction: column;
        }
      }
    </style>
  </head>
  <body>
    <div class="shell">
      <div class="hero">
        <div>
          <h1>agent-passport 离线线程</h1>
          <p id="offline-chat-hero-summary">正在加载离线线程真值。</p>
          <div class="hero-actions">
            <a class="hero-link" href="/">返回公开运行态</a>
            <a class="hero-link" href="/operator">进入值班决策面</a>
            <a class="hero-link" href="/repair-hub">进入受保护修复证据面</a>
          </div>
        </div>
        <div style="display:flex; flex-direction:column; gap:10px; align-items:flex-end;">
          <div class="stack-chip" id="stack-chip">agent-passport 本地栈：加载中…</div>
          <div class="network-chip" id="network-chip">网络状态：检测中…</div>
        </div>
      </div>

      <div class="workspace">
        <aside class="panel sidebar">
          <div class="sidebar-section">
            <h3 class="sidebar-title">管理令牌</h3>
            <div class="auth-card">
              <div class="auth-status" id="auth-status">当前标签页会话鉴权检查中…</div>
              <form class="token-form" id="auth-token-form">
                <input
                  id="auth-token-input"
                  class="token-input"
                  type="password"
                  autocomplete="off"
                  placeholder="只保存在当前标签页会话里"
                />
                <div class="sync-actions">
                  <button class="action-button" id="auth-save-button" type="submit">保存令牌</button>
                  <button class="action-button secondary" id="auth-clear-button" type="button">清除令牌</button>
                </div>
              </form>
            </div>
          </div>
          <div class="sidebar-section">
            <h3 class="sidebar-title">切换线程</h3>
            <div class="thread-list" id="thread-list"></div>
          </div>
          <div class="sidebar-section">
            <h3 class="sidebar-title">线程上下文</h3>
            <div class="thread-context-summary" id="thread-context-summary">正在读取当前线程成员…</div>
            <div class="thread-context-list" id="thread-context-list"></div>
          </div>
          <div class="sidebar-section" id="dispatch-history-section">
            <h3 class="sidebar-title">调度历史</h3>
            <div class="dispatch-history-summary" id="dispatch-history-summary">正在读取最近几轮调度与执行记录…</div>
            <div class="dispatch-history-list" id="dispatch-history-list"></div>
          </div>
          <div class="sidebar-section">
            <h3 class="sidebar-title">回复来源</h3>
            <div class="source-summary" id="source-filter-summary">正在读取当前线程的回复来源…</div>
            <div class="source-filter-list" id="source-filter-list"></div>
          </div>
          <div class="sidebar-section">
            <h3 class="sidebar-title">同步状态</h3>
            <div class="sync-card">
              <div class="sync-status" id="sync-status">正在读取同步状态…</div>
              <div class="sync-actions">
                <button class="action-button" id="sync-button" type="button">立即同步</button>
                <button class="action-button secondary" id="refresh-button" type="button">刷新状态</button>
              </div>
            </div>
          </div>
        </aside>

        <section class="panel chat-panel">
          <div class="chat-header">
            <div>
              <h2 id="thread-title">正在准备离线线程…</h2>
              <p id="thread-description">正在装载当前线程上下文。</p>
            </div>
            <div class="status-pill" id="thread-pill">离线入口准备中</div>
          </div>

          <div class="notice-banner" id="runtime-notice" hidden></div>

          <div class="messages" id="messages">
            <div class="empty-state">正在读取离线线程记录…</div>
          </div>

          <form class="composer" id="composer">
            <textarea
              id="composer-input"
              placeholder="在这里输入消息。单聊只发给当前成员，群聊会先交给主控，满足条件时再按计划放行需要的成员。"
            ></textarea>
            <div class="composer-footer">
              <div class="composer-hint" id="composer-hint">发送后会写回本地记忆，保持线程连续。</div>
              <button class="send-button" id="send-button" type="submit">发送</button>
            </div>
          </form>
        </section>
      </div>
    </div>

    <script type="module" src="/offline-chat-app.js"></script>
  </body>
</html>
